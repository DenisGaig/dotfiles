[mgr]
ratio = [2, 2, 4]  # Proportions des panneaux
linemode = "none"  # Affichage des lignes (métadonnées)
show_hidden = true # Afficher les fichiers cachés

[opener]
edit = [
    { run = 'nvim "$@"', block = true, for = "unix" },
]
open = [
    { run = 'xdg-open "$@"', desc = "Open" },
]
image = [
    { run = 'imv "$@"', desc = "View image", mime = ["image/*"], for = "unix" },
]
images = [
    { run = 'imv-dir "$@"', desc = "View images", mime = ["image/*"], for = "unix" },
]
spreadsheet = [
    { run = 'libreoffice "$@"', desc = "Open with LibreOffice", for = "unix" },
]
pdf = [
    { run = 'zathura "$@"', desc = "Open with zathura", for = "unix" },
]

[open]
rules = [
    { url = "*.csv", use = "spreadsheet" },
    { mime = "text/*", use = "edit" }, # Ouvre les fichiers texte avec nvim
    { mime = "image/*", use = "image" }, # Ouvre les images avec imv (fichier unique)
    { mime = "inode/directory", use = "images" },  # Pour les dossiers
    #{ name = "*.{jpg,jpeg,png,gif,webp,bmp,tiff}", use = "images" },  # Pour les extensions d'images
    { mime = "application/pdf", use = "pdf" },
]
